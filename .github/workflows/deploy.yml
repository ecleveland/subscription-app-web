name: Deploy

on:
  push:
    branches: [master]

# Cancel in-progress deploys when a new push arrives
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  e2e:
    name: E2E
    uses: ./.github/workflows/e2e.yml

  deploy-backend:
    name: Deploy Backend
    needs: [ci, e2e]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # No `--detach`: `railway up` streams the remote Docker build and fails
      # this job if the build fails (the gap that let compile errors ship).
      # Railway then gates the rollout on the healthcheck in backend/railway.toml
      # (`/api/health`) with its restart policy, so an unhealthy image is never
      # promoted to serve traffic.
      - name: Deploy Backend
        run: railway up --service backend ./backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-frontend:
    name: Deploy Frontend
    needs: [ci, e2e]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # No `--detach`: streams the remote build and fails the job on a build
      # error. Railway gates the rollout on the healthcheck in
      # frontend/railway.toml (`/login`) before routing traffic.
      - name: Deploy Frontend
        run: railway up --service frontend ./frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
